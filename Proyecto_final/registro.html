<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro | Plataforma de Marcas</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-body">

  <main class="login-container">
    <section class="login-card">
      <h1>Crear cuenta</h1>
      <p class="subtitulo">Registro de nuevo colaborador</p>

      <form id="registroForm">
        <label>Nombre completo</label>
        <input type="text" id="nombre" placeholder="Digite su nombre completo" required />

        <label>Correo electrónico</label>
        <input type="email" id="email" placeholder="ejemplo@empresa.com" required />

        <label>Contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres" required />

        <label>Fecha de ingreso a la empresa</label>
        <input type="date" id="fechaIngreso" required />

        <label>ID de empleado</label>
        <input type="text" id="idEmpleado" placeholder="Ejemplo: EMP003" required />

        <label>Área</label>
        <input type="text" id="area" placeholder="Ejemplo: Soporte" required />

        <label>Turno</label>
        <select id="turno" required>
          <option value="">Seleccione un turno</option>
          <option value="Diurno">Diurno</option>
          <option value="Nocturno">Nocturno</option>
          <option value="Mixto">Mixto</option>
        </select>

        <button type="submit">Registrarse</button>
      </form>

      <p class="texto-link">
        ¿Ya tiene cuenta?
        <a href="index.html">Iniciar sesión</a>
      </p>

      <p id="mensaje" class="mensaje"></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script src="registro.js"></script>
</body>
</html>

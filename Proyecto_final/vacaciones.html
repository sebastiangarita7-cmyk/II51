<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Vacaciones | Plataforma de Marcas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <h2>Plataforma de Marcas</h2>
  <nav>
    <a href="dashboard.html">Inicio</a>
    <a href="marcas.html">Marcas</a>
    <a href="perfil.html">Mi información</a>
    <a href="tareas.html">Tareas</a>
    <a href="vacaciones.html">Vacaciones</a>
    <a id="adminLink" href="admin.html" class="oculto">Admin</a>
    <button id="btnSalir" class="btn-salir">Salir</button>
  </nav>
</header>

<main class="contenedor">

  <section class="card grande">
    <h1>Solicitar vacaciones</h1>

    <p><strong>Días disponibles:</strong> <span id="diasDisponibles">Cargando...</span></p>

    <form id="formVacaciones">
      <label>Fecha de inicio</label>
      <input type="date" id="fechaInicio" required>

      <label>Fecha de fin</label>
      <input type="date" id="fechaFin" required>

      <label>Motivo</label>
      <textarea id="motivoVacaciones" placeholder="Motivo de la solicitud"></textarea>

      <button type="submit">Enviar solicitud</button>
    </form>

    <p id="mensaje" class="mensaje"></p>
  </section>

  <section class="card grande">
    <h2>Mis solicitudes</h2>
    <div id="listaVacaciones"></div>
  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>
<script src="app.js"></script>
</body>
</html>

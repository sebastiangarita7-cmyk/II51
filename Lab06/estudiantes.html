<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estudiantes</title>
    <link rel="stylesheet" href="./estilos.css" />
  </head>
  <body>
    <div class="container">
      <!-- header -->
      <div class="header">
        <div class="header-title">Laboratorio 6 - Estudiantes</div>
        <div class="header-subtitle">Consulta de estudiantes</div>
      </div>

      <div class="card">
          <div class="controls">
            <div class="field">
              <label for="txtNombre">Nombre:</label>
              <input type="text" id="txtNombre" placeholder="Ingrese el nombre del estudiante" required />
            </div>
            <div class="field">
              <label for="txtApellido">Apellido:</label>
              <input type="text" id="txtApellido" placeholder="Ingrese el apellido del estudiante" required />
            </div>
            <div class="field">
              <label for="txtCorreo">Correo:</label>
              <input type="email" id="txtCorreo" placeholder="Ingrese el correo del estudiante" />
            </div>
            <div class="field">
              <label for="txtCarrera">Carrera:</label>
              <input type="text" id="txtCarrera" placeholder="Ingrese la carrera del estudiante" />
            </div>
            <div class="field buttons">
              <button id="btnAdd" class="btn btn-success" type="submit">Agregar</button>
              <button id="btnCancel" class="btn btn-success" type="button">Cancelar</button>
            </div>
          </div>
      </div>

      <!-- controles -->
      <div class="card">
        <div class="field">
          <input type="text" id="txtSearch" placeholder="Buscar estudiante por nombre" />

          <button id="btnLoad" class="btn btn-primary" type="button">Consultar</button>
          <button id="btnClear" class="btn btn-secondary" type="button">Limpiar</button>
        </div>
      </div>

      <!-- tabla -->
      <div class="card">
        <div class="table-wrap">
          <table id="tblEstudiantes">
            <thead>
              <tr>
                <!-- <th>ID</th> -->
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Correo</th>
                <th>Carrera</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tbodyStudents"></tbody>
          </table>
        </div>
      </div>
    </div>
    <script src="./app.js" type="module"></script>
  </body>
</html>

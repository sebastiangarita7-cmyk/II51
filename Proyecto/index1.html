<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login por Cédula</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<h1>Ingreso al Sistema RRHH</h1>

<input type="text" id="cedula" placeholder="Ingrese su cédula">
<button onclick="loginCedula()">Ingresar</button>

<p id="mensaje"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Init Supabase client (use your anon key)
const supabaseUrl = 'https://vdimnldttlxudqswbjzn.supabase.co';
    const supabaseKey = 'https://tsvcfyizphlkovewphiu.supabase.co'; // Replace with actual anon key from Supabase dashboard (Settings > API)
const { createClient } = supabase;
const supabase = createClient(supabaseUrl, supabaseKey);

// Check session
const usuario = JSON.parse(localStorage.getItem("usuario"));
if (usuario) {
    window.location.href = "dashboard.html";
}

async function loginCedula() {
    const cedula = document.getElementById("cedula").value;
    const mensajeEl = document.getElementById("mensaje");

    if (!cedula) {
        mensajeEl.innerText = "Ingrese una cédula";
        return;
    }

    mensajeEl.innerText = ""; // Clear previous

    const { data, error } = await supabase
        .from("usuarios")
        .select("*")
        .eq("cedula", cedula)
        .single();

    if (error) {
        console.error(error);
        mensajeEl.innerText = "Error de servidor";
        return;
    }

    if (data) {
        localStorage.setItem("usuario", JSON.stringify(data));
        window.location.href = "dashboard.html";
    } else {
        mensajeEl.innerText = "Cédula no encontrada";
    }
}
</script>
</body>
</html>
